name: backend-ci

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: filmos
          POSTGRES_PASSWORD: filmos
          POSTGRES_DB: filmos
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U filmos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: python -m pytest -q

      - name: Build Docker image
        run: docker build -t filmos-backend:ci .
