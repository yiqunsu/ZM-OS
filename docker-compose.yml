services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: filmos
      POSTGRES_PASSWORD: filmos
      POSTGRES_DB: filmos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://filmos:filmos@postgres:5432/filmos
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local
    depends_on:
      - backend

volumes:
  pgdata: